    <!-- Надпись «кайфуля» -->
    <text x="100" y="118" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="22" font-style="italic" font-weight="600" fill="#f4d3a5">кайфуля</text>
  </g>
</svg>
