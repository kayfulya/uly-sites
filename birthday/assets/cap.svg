<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <rect width="200" height="250" fill="#f7eedf"/>
  <!-- Кепка -->
  <g>
    <!-- Купол -->
    <path d="M 40 130 Q 40 70 100 70 Q 160 70 160 130 L 158 138 L 42 138 Z" fill="#5d6b5b" stroke="#1c1c1c" stroke-width="2.5"/>
    <!-- Шов вертикальный -->
    <path d="M 100 70 L 100 138" stroke="#1c1c1c" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
    <!-- Шов горизонтальный -->
    <path d="M 40 130 Q 100 122 160 130" stroke="#1c1c1c" stroke-width="1.5" fill="none"/>
    <!-- Козырёк -->
    <path d="M 36 138 Q 100 168 164 138 L 162 146 Q 100 174 38 146 Z" fill="#3f4a3d" stroke="#1c1c1c" stroke-width="2.5"/>
    <!-- Кнопка сверху -->
