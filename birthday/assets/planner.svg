<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <rect width="200" height="250" fill="#efe7d4"/>

  <!-- тень от блокнота -->
  <rect x="48" y="62" width="108" height="148" fill="#1c1c1c" opacity="0.08" rx="2"/>

  <!-- обложка ежедневника -->
  <g stroke="#1c1c1c" stroke-width="2.5" stroke-linejoin="round">
    <rect x="44" y="58" width="108" height="148" fill="#5d6b5b" rx="2"/>

    <!-- внутренняя рамка-тиснение -->
    <rect x="56" y="74" width="84" height="116" fill="none" stroke="#f7eedf" stroke-width="1" opacity="0.6"/>

    <!-- надпись -->
    <text x="98" y="138" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-style="italic" font-size="22" fill="#f7eedf">дневник</text>
    <text x="98" y="160" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-style="italic" font-size="14" fill="#f7eedf" opacity="0.85">2026</text>

    <!-- пружинка сверху -->
    <g fill="#f7eedf" stroke="#1c1c1c" stroke-width="1.5">
      <circle cx="58" cy="58" r="4"/>
      <circle cx="74" cy="58" r="4"/>
      <circle cx="90" cy="58" r="4"/>
      <circle cx="106" cy="58" r="4"/>
      <circle cx="122" cy="58" r="4"/>
      <circle cx="138" cy="58" r="4"/>
    </g>
  </g>

  <!-- закладка-ленточка -->
  <path d="M 122 206 L 122 232 L 116 224 L 110 232 L 110 206 Z" fill="#b8431f" stroke="#1c1c1c" stroke-width="2" stroke-linejoin="round"/>

  <!-- карандаш сбоку -->
  <g stroke="#1c1c1c" stroke-width="2" stroke-linejoin="round">
    <rect x="158" y="84" width="10" height="96" fill="#b8431f"/>
    <path d="M 158 180 L 168 180 L 163 194 Z" fill="#f7eedf"/>
    <path d="M 161 190 L 165 190" stroke-width="1.5"/>
    <rect x="158" y="78" width="10" height="6" fill="#1c1c1c"/>
  </g>
</svg>
