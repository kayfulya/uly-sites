<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <rect width="200" height="250" fill="#efe7d4"/>
  <!-- телефон -->
  <g stroke="#1c1c1c" stroke-width="2.5" stroke-linejoin="round">
    <rect x="46" y="30" width="108" height="200" rx="18" fill="#1c1c1c"/>
    <rect x="54" y="38" width="92" height="184" rx="10" fill="#f0d9bf"/>
    <!-- полоски сторис -->
    <line x1="62" y1="50" x2="76" y2="50" stroke="#1c1c1c" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="80" y1="50" x2="94" y2="50" stroke="#1c1c1c" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="98" y1="50" x2="112" y2="50" stroke="#b8431f" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="116" y1="50" x2="130" y2="50" stroke="#1c1c1c" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
    <!-- аватарка -->
    <circle cx="74" cy="74" r="10" fill="#b8431f"/>
    <text x="90" y="78" font-family="Inter, sans-serif" font-size="9" fill="#1c1c1c" font-weight="600">кайфуля</text>
    <!-- сердечко -->
    <path d="M 100 130 Q 88 116 78 124 Q 70 132 78 142 Q 90 156 100 162 Q 110 156 122 142 Q 130 132 122 124 Q 112 116 100 130 Z" fill="#b8431f"/>
    <!-- подпись -->
  </g>
  <text x="100" y="194" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-style="italic" font-size="13" fill="#1c1c1c">любимая подружка!</text>
</svg>
