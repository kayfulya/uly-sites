<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Выбери белку</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500&display=swap">
  <style>
    body { font-family: Inter, sans-serif; background: #f3ede2; color: #1c1c1c; margin: 0; padding: 40px 24px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 44px; max-width: 800px; margin: 0 auto 8px; letter-spacing: -0.02em; }
    .hint { max-width: 800px; margin: 0 auto 36px; color: #4a4641; }
    .grid { max-width: 800px; margin: 0 auto; display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
    @media (min-width: 720px) { .grid { grid-template-columns: repeat(5, 1fr); } }
    .cell { background: #fbf7ee; border: 1px solid #cbc1ad; padding: 14px; border-radius: 4px; text-align: center; }
    .cell img { width: 100%; height: auto; aspect-ratio: 1; display: block; }
    .num { font-family: 'Cormorant Garamond', serif; font-size: 22px; margin-top: 6px; color: #b8431f; }
  </style>
</head>
<body>
  <h1>10 белок — выбери</h1>
  <p class="hint">Скажи мне номер — поставлю эту белку по всему сайту.</p>
  <div class="grid">
    <div class="cell"><img src="assets/squirrels/sq-1.svg"><div class="num">01</div></div>
    <div class="cell"><img src="assets/squirrels/sq-2.svg"><div class="num">02</div></div>
    <div class="cell"><img src="assets/squirrels/sq-3.svg"><div class="num">03</div></div>
    <div class="cell"><img src="assets/squirrels/sq-4.svg"><div class="num">04</div></div>
    <div class="cell"><img src="assets/squirrels/sq-5.svg"><div class="num">05</div></div>
    <div class="cell"><img src="assets/squirrels/sq-6.svg"><div class="num">06</div></div>
    <div class="cell"><img src="assets/squirrels/sq-7.svg"><div class="num">07</div></div>
    <div class="cell"><img src="assets/squirrels/sq-8.svg"><div class="num">08</div></div>
    <div class="cell"><img src="assets/squirrels/sq-9.svg"><div class="num">09</div></div>
    <div class="cell"><img src="assets/squirrels/sq-10.svg"><div class="num">10</div></div>
  </div>
</body>
</html>
